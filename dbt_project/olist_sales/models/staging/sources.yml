version: 2

sources:
  - name: olist
    schema: main
    tables:
      - name: olist_orders_dataset
        columns:
          - name: order_id
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null

      - name: olist_customers_dataset
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null

      - name: olist_order_items_dataset
        columns:
          - name: order_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: seller_id
            tests:
              - not_null

      - name: olist_order_payments_dataset
        columns:
          - name: order_id
            tests:
              - not_null

      - name: olist_sellers_dataset
        columns:
          - name: seller_id
            tests:
              - unique
              - not_null

      - name: olist_products_dataset
        columns:
          - name: product_id
            tests:
              - unique
              - not_null

      - name: olist_order_reviews_dataset
        columns:
          - name: review_id
            tests:
              - not_null

      - name: product_category_name_translation
        columns:
          - name: product_category_name
            tests:
              - not_null