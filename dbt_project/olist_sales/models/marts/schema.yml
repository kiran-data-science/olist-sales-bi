version: 2

models:
  - name: fct_orders
    description: "One row per order with all metrics joined"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable',
                         'invoiced', 'processing', 'created', 'approved']

  - name: dim_customers
    description: "One row per customer with RFM segmentation"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_segment
        tests:
          - accepted_values:
              arguments:
                values: ['Champion', 'Loyal', 'Recent', 'At Risk', 'Churned']

  - name: dim_sellers
    description: "One row per seller with performance metrics"
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null
      - name: seller_tier
        tests:
          - accepted_values:
              arguments:
                values: ['Platinum', 'Gold', 'Silver', 'Bronze']

  - name: dim_products
    description: "One row per product with category and sales metrics"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: mart_sales_daily
    description: "Pre-aggregated monthly sales KPIs"
    columns:
      - name: order_month
        tests:
          - not_null